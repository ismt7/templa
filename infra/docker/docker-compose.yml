version: "3.9"

services:
  app:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.dev
    container_name: templa-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - templa-network

networks:
  templa-network:
    driver: bridge
